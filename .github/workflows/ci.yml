name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint || echo "No lint script defined"

      - name: Run TypeScript type check
        run: pnpm exec tsc --noEmit

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  database-tests:
    name: Database CRUD Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install test dependencies
        run: pnpm add -D vitest @vitest/ui @vitest/coverage-v8

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local instance
        run: pnpm exec supabase start

      - name: Get Supabase credentials and create .env.test
        run: |
          SUPABASE_URL=$(pnpm exec supabase status | grep "API URL" | awk '{print $3}')
          SUPABASE_ANON_KEY=$(pnpm exec supabase status | grep "anon key" | awk '{print $3}')
          echo "VITE_SUPABASE_URL=$SUPABASE_URL" > .env.test
          echo "VITE_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY" >> .env.test

      - name: Run database tests
        run: pnpm test:db

      - name: Generate coverage report
        if: always()
        run: pnpm test:db:coverage || echo "Coverage generation failed"

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: database-tests
          fail_ci_if_error: false
        continue-on-error: true

      - name: Stop Supabase
        if: always()
        run: pnpm exec supabase stop

  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [lint, build, database-tests]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Lint job failed"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build job failed"
            exit 1
          fi
          if [ "${{ needs.database-tests.result }}" != "success" ]; then
            echo "Database tests job failed"
            exit 1
          fi
          echo "All jobs passed successfully!"
