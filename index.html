    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- Structured Data (JSON-LD) for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "FairPay",
      "description": "Split expenses fairly with friends and groups. Track shared costs, settle debts, and manage group finances with ease.",

      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "FairPay",
        "url": "https://long-pay.vercel.app"
      },
      "screenshot": "https://long-pay.vercel.app/banner.png",
      "featureList": [
        "Split expenses with friends and groups",
        "Track shared costs in real-time",
        "Settle debts easily",
        "Manage group finances",

        "Receipt attachments",
        "Payment tracking"
      ]
    }

    <title>FairPay - Expense Splitting Made Easy | Free Bill Splitter App</title>

    <!-- Font optimization -->
    <style>
      /* System font stack for instant text rendering */
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Prevent layout shift during font loading */
      /* Note: font-display: swap is set globally for any custom fonts loaded */
      * {
        font-display: swap;
      }
    </style>

    <!-- Dynamic theme-color based on user preference -->
    <script>
      (function() {
        const themeVariant = localStorage.getItem('refine-ui-theme-variant') || 'monokai-pro-light';
        const isDark = themeVariant.includes('-dark');
        const themeColor = isDark ? '#252525' : '#f9fafb';
        document.querySelector('meta[name="theme-color"]').setAttribute('content', themeColor);
      })();
    </script>

      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
